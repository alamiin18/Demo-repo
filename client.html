<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* --- Login Screen --- */
    #login-screen {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }
    #login-screen h1 { font-size: 1.8rem; color: #00d4ff; margin-bottom: 8px; }
    #login-screen p  { color: #888; margin-bottom: 24px; }
    #login-screen input {
      width: 100%; padding: 12px 16px;
      border-radius: 8px; border: 2px solid #0f3460;
      background: #0f3460; color: #fff;
      font-size: 1rem; margin-bottom: 16px;
      outline: none; transition: border 0.2s;
    }
    #login-screen input:focus { border-color: #00d4ff; }
    #login-screen button {
      width: 100%; padding: 12px;
      background: #00d4ff; color: #0f3460;
      font-size: 1rem; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen button:hover { background: #00b8d4; }
    #login-error { color: #ff6b6b; margin-top: 12px; font-size: 0.9rem; }

    /* --- Chat Screen --- */
    #chat-screen {
      display: none;
      width: 100%;
      max-width: 1000px;
      height: 90vh;
      background: #16213e;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      overflow: hidden;
      flex-direction: row;
    }

    /* Sidebar */
    #sidebar {
      width: 220px;
      background: #0f3460;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #sidebar h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #00d4ff; margin-bottom: 8px; }
    .user-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px;
      background: rgba(255,255,255,0.05);
      font-size: 0.9rem;
    }
    .user-item .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #2ecc71; flex-shrink: 0;
    }
    #online-count { font-size: 0.75rem; color: #888; margin-top: 4px; }

    /* Main chat area */
    #chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat-header {
      padding: 16px 20px;
      background: #12244a;
      border-bottom: 1px solid #0f3460;
      font-size: 1.1rem;
      font-weight: 600;
      color: #00d4ff;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
    }
    .msg .sender { font-size: 0.75rem; font-weight: 700; margin-bottom: 3px; color: #00d4ff; }
    .msg .text   { font-size: 0.95rem; }

    .msg.own {
      align-self: flex-end;
      background: #00d4ff22;
      border: 1px solid #00d4ff44;
    }
    .msg.other {
      align-self: flex-start;
      background: #0f3460;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #888;
      font-size: 0.8rem;
      font-style: italic;
      padding: 4px 0;
    }

    /* Input area */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #12244a;
      border-top: 1px solid #0f3460;
    }
    #msg-input {
      flex: 1; padding: 12px 16px;
      border-radius: 8px; border: 2px solid #0f3460;
      background: #0f3460; color: #fff;
      font-size: 0.95rem; outline: none;
      transition: border 0.2s;
    }
    #msg-input:focus { border-color: #00d4ff; }
    #send-btn {
      padding: 12px 20px;
      background: #00d4ff; color: #0f3460;
      font-weight: 700; font-size: 0.95rem;
      border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    #send-btn:hover { background: #00b8d4; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <h1>💬 LiveChat</h1>
    <p>Enter a username to join the group chat</p>
    <input id="username-input" type="text" placeholder="Your username" maxlength="20" />
    <button onclick="joinChat()">Join Chat →</button>
    <div id="login-error"></div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div id="sidebar">
      <h2>🟢 Online</h2>
      <div id="online-count"></div>
      <div id="user-list"></div>
    </div>
    <div id="chat-main">
      <div id="chat-header">Global Chat Room</div>
      <div id="messages"></div>
      <div id="input-area">
        <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" />
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let myUsername = "";

    function joinChat() {
      const input = document.getElementById("username-input");
      const username = input.value.trim();
      if (!username) return;

      myUsername = username;
      ws = new WebSocket(`ws://${location.host}/ws/${encodeURIComponent(username)}`);

      ws.onopen = () => {
        // Connection opened; wait for server welcome/error
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "error") {
          document.getElementById("login-error").textContent = data.message;
          ws.close();
          return;
        }

        if (data.type === "welcome") {
          // Switch to chat screen
          document.getElementById("login-screen").style.display = "none";
          const chatScreen = document.getElementById("chat-screen");
          chatScreen.style.display = "flex";
          updateOnlineUsers(data.online_users);
          appendSystemMessage(data.message);
          return;
        }

        if (data.type === "system") {
          appendSystemMessage(data.message);
          updateOnlineUsers(data.online_users);
          return;
        }

        if (data.type === "message") {
          appendMessage(data.sender, data.text, data.sender === myUsername);
          updateOnlineUsers(data.online_users);
        }
      };

      ws.onclose = () => {
        appendSystemMessage("Disconnected from server.");
      };
    }

    function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text || !ws) return;
      ws.send(JSON.stringify({ type: "message", text }));
      input.value = "";
    }

    // Send on Enter key
    document.getElementById("msg-input") && document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("msg-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && document.activeElement.id === "msg-input") sendMessage();
      if (e.key === "Enter" && document.activeElement.id === "username-input") joinChat();
    });

    function appendMessage(sender, text, isOwn) {
      const msgs = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${isOwn ? "own" : "other"}`;
      div.innerHTML = `<div class="sender">${escapeHtml(sender)}</div><div class="text">${escapeHtml(text)}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendSystemMessage(text) {
      const msgs = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg system";
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function updateOnlineUsers(users) {
      const list = document.getElementById("user-list");
      const count = document.getElementById("online-count");
      count.textContent = `${users.length} online`;
      list.innerHTML = users.map(u =>
        `<div class="user-item"><div class="dot"></div>${escapeHtml(u)}</div>`
      ).join("");
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
